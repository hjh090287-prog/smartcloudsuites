<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | SmartCloud Suites</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0a0a0f; --text: #f0f0f5; --muted: rgba(240,240,245,0.5); --primary: #0ea5e9; --border: rgba(255,255,255,0.08); }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; padding-top: 60px; }
    .container { max-width: 600px; width: 100%; padding: 40px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 24px; text-align: center; }
    .logo { font-weight: 800; font-size: 1.5rem; text-decoration: none; color: white; display: block; margin-bottom: 20px; }
    .logo span { color: var(--primary); }
    h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 16px; letter-spacing: -1px; }
    p { color: var(--muted); margin-bottom: 32px; font-size: 1.1rem; }
    .contact-card { background: rgba(14,165,233,0.1); border: 1px solid rgba(14,165,233,0.2); padding: 30px; border-radius: 16px; margin-bottom: 32px; }
    .email { font-size: 1.5rem; font-weight: 800; color: var(--primary); text-decoration: none; word-break: break-all; }
    .email:hover { text-decoration: underline; }
    .back-link { display: inline-block; color: var(--text); text-decoration: none; font-weight: 600; font-size: 0.9rem; padding: 10px 20px; background: rgba(255,255,255,0.05); border-radius: 100px; transition: 0.2s; }
    .back-link:hover { background: rgba(255,255,255,0.1); }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="logo">Smart<span>Cloud</span> Suites</a>
    <h1>Get in Touch</h1>
    <p>Have a question, feedback, or a tool suggestion? We'd love to hear from you.</p>
    
    <div class="contact-card">
      <div style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 8px;">Support Email</div>
      <a href="mailto:support@smartcloudsuites.com" class="email">support@smartcloudsuites.com</a>
    </div>

    <a href="index.html" class="back-link">← Back to Tools</a>
  </div>
  <script src="assets/js/suite-nav.js"></script>
<script src="assets/js/suite-footer.js"></script>
</body>
</html>
